name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 */6 * * *'   # runs every 6 hours
  workflow_dispatch:          # lets you trigger it manually too

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Wake up Streamlit app
        run: |
          python - <<'EOF'
          from playwright.sync_api import sync_playwright
          import time

          URL = "https://yashpatel-bioinformatics.streamlit.app"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              print(f"Visiting {URL}...")
              page.goto(URL, timeout=60000)
              time.sleep(10)

              # If app is sleeping, click the wake button
              try:
                  btn = page.get_by_text("Yes, get this app back up!")
                  if btn.is_visible():
                      btn.click()
                      print("App was sleeping — woke it up!")
                      time.sleep(15)
                  else:
                      print("App is already awake.")
              except:
                  print("App is already awake.")

              browser.close()
          EOF
